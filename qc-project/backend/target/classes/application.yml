server:
  port: 8080
  # 注意：不设置 context-path，统一由 Controller 的 @RequestMapping("/api/...") 管理路径
  # 设置了 context-path 会导致 JwtFilter 的 URL 匹配与 req.getRequestURI() 不一致

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/qc_system
    username: qc_system
    password: Wsadeq#8009
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # 生产环境用 validate，不自动建表（用 schema.sql）
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  mvc:
    cors:
      allowed-origins: "*"

# JWT 配置
jwt:
  secret: ${JWT_SECRET:xnl-qc-system-secret-key-2024-very-long-for-security}
  expiration: 86400000   # 24 小时（毫秒）

logging:
  level:
    com.xnl.qc: INFO
    org.springframework.web: WARN
