<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 心内六科质控系统</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: linear-gradient(135deg,#0d1117 0%,#161b22 40%,#0d2137 100%);
    position: relative; overflow: hidden;
  }
  body::before {
    content:''; position:absolute; width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle,rgba(192,57,43,.15) 0%,transparent 70%);
    top:-200px; right:-200px;
  }
  body::after {
    content:''; position:absolute; width:400px; height:400px; border-radius:50%;
    background:radial-gradient(circle,rgba(212,168,67,.1) 0%,transparent 70%);
    bottom:-100px; left:-100px;
  }
  .login-card {
    background: #fff; border-radius: 22px; padding: 50px 46px;
    width: 420px; max-width: 94vw;
    box-shadow: 0 28px 90px rgba(0,0,0,.55);
    position: relative; z-index: 1; border-top: 4px solid var(--crimson);
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo .cross { font-size: 46px; color: var(--crimson); display: block; line-height: 1; margin-bottom: 10px; }
  .login-logo h1 { font-family: 'Noto Serif SC', serif; font-size: 19px; font-weight: 700; color: var(--ink); letter-spacing: 2px; line-height: 1.5; }
  .login-logo p  { font-size: 12px; color: var(--muted); margin-top: 5px; letter-spacing: 1px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
  .btn-login-full { width: 100%; padding: 14px; font-size: 15px; letter-spacing: 3px; margin-top: 6px; }
  .login-hint { text-align: center; margin-top: 16px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <span class="cross">✚</span>
    <h1>心内六科护理质控<br>填报管理系统</h1>
    <p>责班每日查检 · 数据汇总 · 质量管理</p>
  </div>
  <hr class="divider">

  <div class="field-group">
    <label>护士工号</label>
    <input type="text" id="empId" placeholder="请输入工号（不区分大小写）"
           autocomplete="off" style="font-size:15px;padding:12px 15px;">
  </div>
  <div class="field-group">
    <label>登录密码</label>
    <input type="password" id="password" placeholder="请输入登录密码"
           style="font-size:15px;padding:12px 15px;"
           onkeydown="if(event.key==='Enter')login()">
  </div>

  <button class="btn btn-red btn-login-full" onclick="login()" id="loginBtn">
    登 录 系 统
  </button>
  <div class="err-msg" id="errMsg" style="display:none;text-align:center;margin-top:10px;"></div>
  <div class="login-hint">初始密码：XNL226</div>
</div>

<script type="module">
import { AuthAPI, Auth } from '/js/api.js';
import { showLoading, hideLoading } from '/js/ui.js';

window.login = async function () {
  const empId    = document.getElementById('empId').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if (!empId)    { showErr('请输入工号'); return; }
  if (!password) { showErr('请输入密码'); return; }

  showLoading('验证中…');
  const res = await AuthAPI.login(empId, password);
  hideLoading();

  if (!res || res.code !== 200) {
    showErr(res?.message || '登录失败，请重试');
    return;
  }

  Auth.save(res.data);
  // 确保 localStorage 写入完成后再跳转（极少数浏览器在同步跳转时未落盘）
  setTimeout(() => { location.href = '/pages/main.html'; }, 30);
};

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
